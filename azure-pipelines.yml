# CI/CD pipeline for Azure DevOps — staged.
# Branching model: work on `development`, release from `main`.
#
# The pipeline triggers ONLY on main (work happens on `development`; release by merging to main).
# Stages: Compile → Test → Package (→ .vsix artifact) → Publish.
#   - Compile / Test / Package run on every push & PR to main.
#   - Publish runs ONLY after MANUAL approval (ManualValidation pauses the run; approve it in the
#     Azure DevOps UI / via the notification email), then `vsce publish`. The publish is idempotent:
#     if the version in package.json is already on the Marketplace, it skips instead of failing.
#
# VSCE_PAT must be set as a SECRET pipeline variable (Pipelines → Edit → Variables → New →
# tick "Keep this value secret"). Use an Azure DevOps PAT, scope Marketplace → Manage,
# "All accessible organizations". It is consumed only via the env mapping in the publish job.
# IMPORTANT: do NOT declare VSCE_PAT in a YAML `variables` block — that shadows the secret and
# leaves it empty at runtime.

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  # Auto-incrementing patch: every build gets a unique version (major.minor come from package.json,
  # patch from this counter) so `vsce publish` never fails with "version already exists". The
  # counter persists across runs and increments each time. NOTE: do NOT add VSCE_PAT here.
  patch: $[counter('langchat-patch', 1)]

stages:
  - stage: Compile
    displayName: 'Compile (lint + typecheck)'
    jobs:
      - job: compile
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseNode@1
            displayName: 'Install Node.js 20'
            inputs:
              version: '20.x'
          - task: Cache@2
            displayName: 'npm cache'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(Pipeline.Workspace)/.npm
          - script: npm config set cache "$(Pipeline.Workspace)/.npm" --global
            displayName: 'Point npm to the cache'
          - script: npm ci
            displayName: 'Install dependencies (npm ci)'
          - script: npm run lint
            displayName: 'Lint (ESLint)'
          - script: npm run compile
            displayName: 'Compile (typecheck)'

  - stage: Test
    displayName: 'Test'
    dependsOn: Compile
    jobs:
      - job: test
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseNode@1
            displayName: 'Install Node.js 20'
            inputs:
              version: '20.x'
          - task: Cache@2
            displayName: 'npm cache'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(Pipeline.Workspace)/.npm
          - script: npm config set cache "$(Pipeline.Workspace)/.npm" --global
            displayName: 'Point npm to the cache'
          - script: npm ci
            displayName: 'Install dependencies (npm ci)'
          - script: npm test
            displayName: 'Tests (node:test)'

  - stage: Package
    displayName: 'Package (.vsix)'
    dependsOn: Test
    jobs:
      - job: package
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseNode@1
            displayName: 'Install Node.js 20'
            inputs:
              version: '20.x'
          - task: Cache@2
            displayName: 'npm cache'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(Pipeline.Workspace)/.npm
          - script: npm config set cache "$(Pipeline.Workspace)/.npm" --global
            displayName: 'Point npm to the cache'
          - script: npm ci
            displayName: 'Install dependencies (npm ci)'
          - script: |
              node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));const [maj,min]=p.version.split('.');p.version=maj+'.'+min+'.'+'$(patch)';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');console.log('Packaging version '+p.version);"
            displayName: 'Stamp auto-incremented version (major.minor.$(patch))'
          - script: npx --yes @vscode/vsce package -o lang-chat.vsix
            displayName: 'Package (.vsix)'
          - task: PublishPipelineArtifact@1
            displayName: 'Publish the .vsix artifact'
            inputs:
              targetPath: lang-chat.vsix
              artifact: vsix

  - stage: Publish
    displayName: 'Publish to Marketplace (manual approval)'
    dependsOn: Package
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: waitForApproval
        displayName: 'Wait for manual approval'
        pool: server
        timeoutInMinutes: 4320 # up to 3 days to approve
        steps:
          - task: ManualValidation@0
            displayName: 'Manual approval to publish'
            inputs:
              notifyUsers: 'enavarre@enpro.cl'
              instructions: 'Approve to publish Lang Chat to the VS Code Marketplace (uses the version in package.json). Reject to skip.'
              onTimeout: 'reject'
      - job: publish
        displayName: 'vsce publish'
        dependsOn: waitForApproval
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseNode@1
            displayName: 'Install Node.js 20'
            inputs:
              version: '20.x'
          - task: DownloadPipelineArtifact@2
            displayName: 'Download the .vsix artifact'
            inputs:
              artifact: vsix
              path: $(Pipeline.Workspace)/vsix
          - script: |
              set +e
              OUT=$(npx --yes @vscode/vsce publish --packagePath "$(Pipeline.Workspace)/vsix/lang-chat.vsix" 2>&1)
              CODE=$?
              echo "$OUT"
              if [ $CODE -ne 0 ]; then
                if echo "$OUT" | grep -qi "already exists"; then
                  echo "This version is already on the Marketplace — nothing to publish (idempotent, not an error)."
                  exit 0
                fi
                exit $CODE
              fi
            displayName: 'Publish to VS Code Marketplace'
            env:
              VSCE_PAT: $(VSCE_PAT)
