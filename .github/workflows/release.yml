# CI/CD for GitHub Actions — equivalent to the old azure-pipelines.yml.
# Manual only: runs ONLY when triggered from the Actions tab ("Run workflow"). Never on push/PR.
# Jobs: build (lint · compile · test · package → .vsix artifact) → tag (move vX.Y.Z onto this commit)
#       → publish-marketplace ∥ publish-openvsx.
#   - Run it on `master` to publish; both publish jobs are gated by MANUAL APPROVAL and run in
#     PARALLEL, so a failure in one is retried on its own (re-run that job) without re-approving or
#     touching the other registry.
#   - `tag` runs right before the two deploys: it (re)creates the `v<package.json version>` tag on the
#     commit being released — deleting it first if it already pointed elsewhere — so the tag always
#     tracks the published commit. Needs `contents: write` (granted only on that job).
#   - Run it on any other branch to just build/test/package (publish is skipped off master).
#
# Targets BOTH registries, each with its OWN environment gate + token:
#   - publish-marketplace → VS Code Marketplace (VS Code)            · env `marketplace`  · VSCE_PAT
#   - publish-openvsx     → Open VSX (VSCodium / Cursor / Gitpod…)   · env `open-vsx`     · OVSX_PAT
#
# Configure each environment once in Settings → Environments → New environment → enable
#   "Required reviewers" (add yourself) and add its token as an environment secret:
#   - VSCE_PAT: Azure DevOps PAT, scope Marketplace → Manage ("All accessible organizations").
#   - OVSX_PAT: Open VSX access token (open-vsx.org → Settings → Access Tokens). The `enavarre`
#     namespace is auto-created on first run. Both publishes are idempotent (skip if version exists).
# Versioning: the published version IS package.json's `version` (single source of truth). Bump it
#   (semver) before pushing/merging to master to cut a release. The publish is idempotent: if that
#   version is already on the Marketplace, it skips instead of failing (no error on re-runs).

name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # A single sequential build pipeline shares one runner + one `npm ci` (lint → compile → test →
  # package). They run on the same environment with no parallelism between them, so they belong in
  # one job as steps, not three separate jobs (which would triple the runner spin-up and npm ci).
  build:
    name: Build (lint · compile · test · package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run compile
      - run: npm test
      - run: npx --yes @vscode/vsce package -o jotflow.vsix
      - uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: jotflow.vsix

  # (Re)create the release tag on the commit being published, right before the two deploys. If the
  # tag already exists (anywhere), it is deleted and re-pointed at this commit, so `v<version>` always
  # tracks the published commit. Only on master; needs write access to push the tag.
  tag:
    name: Tag release commit
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to push (and overwrite) the tag
    steps:
      - uses: actions/checkout@v5
      - name: Create or move v<version> to this commit
        run: |
          set -euo pipefail
          VER=$(node -p "require('./package.json').version")
          TAG="v$VER"
          SHA=$(git rev-parse --short HEAD)
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # If it exists, delete it (local + remote) so it can be re-pointed at the current commit.
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          # Create it fresh on this commit and push.
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/$TAG"
          echo "Tagged $SHA as $TAG"

  # The two publishes are SEPARATE, PARALLEL jobs (both `needs: [build, tag]`), each behind its OWN
  # environment gate and its OWN token. If one fails, re-run just that job — no re-approval, and the
  # other registry is untouched. Both publishes are idempotent (skip if the version already exists).
  publish-marketplace:
    name: Publish · VS Code Marketplace
    needs: [build, tag]
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: marketplace # approval gate + VSCE_PAT
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - uses: actions/download-artifact@v7
        with:
          name: vsix
          path: .
      - name: Publish (idempotent)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set +e
          OUT=$(npx --yes @vscode/vsce publish --packagePath jotflow.vsix 2>&1)
          CODE=$?
          echo "$OUT"
          if [ $CODE -ne 0 ]; then
            if echo "$OUT" | grep -qi "already exists"; then
              echo "This version is already on the Marketplace — nothing to publish (idempotent)."
              exit 0
            fi
            exit $CODE
          fi

  publish-openvsx:
    name: Publish · Open VSX
    needs: [build, tag]
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: open-vsx # approval gate + OVSX_PAT
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - uses: actions/download-artifact@v7
        with:
          name: vsix
          path: .
      # Best-effort: creates the `enavarre` namespace on first run, no-op once it exists.
      - name: Ensure namespace
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx create-namespace enavarre -p "$OVSX_PAT" || true
      - name: Publish (idempotent)
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set +e
          OUT=$(npx --yes ovsx publish jotflow.vsix -p "$OVSX_PAT" 2>&1)
          CODE=$?
          echo "$OUT"
          if [ $CODE -ne 0 ]; then
            if echo "$OUT" | grep -qiE "already exists|already published|same or greater"; then
              echo "This version is already on Open VSX — nothing to publish (idempotent)."
              exit 0
            fi
            exit $CODE
          fi
