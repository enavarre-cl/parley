# Dependabot — keeps dependencies current and patched.
#   - Security updates (CVEs) are enabled in repo Settings and open PRs immediately, regardless of this file.
#   - This file adds routine VERSION updates: one grouped PR/week per ecosystem, to keep noise low.
# CI (.github/workflows/ci.yml) runs on every Dependabot PR, so a bump that breaks the gate is caught
# before merge. Majors are listed separately so they don't ride in silently with the minor/patch group.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Majors are intentional, hands-on decisions (e.g. undici 6 / @types/node 20 are pinned to match
    # VS Code's Node runtime), so Dependabot only proposes minor/patch — grouped into one quiet PR.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # @types/vscode MUST equal engines.vscode (the min VS Code we support), NOT float to latest —
      # otherwise `vsce package` fails ("@types/vscode > engines.vscode"). Bump it by hand with engines.
      - dependency-name: "@types/vscode"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
